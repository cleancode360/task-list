server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: todo-backend
  config:
    import: optional:aws-secretsmanager:${AWS_SECRET_NAME}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/todo}
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  jackson:
    deserialization:
      fail-on-unknown-properties: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:a-default-dev-secret-that-is-at-least-32-characters-long}
    access-expiration-ms: 900000
    refresh-expiration-ms: 2592000000

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
