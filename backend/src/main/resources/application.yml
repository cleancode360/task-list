server:
  port: 8080

spring:
  application:
    name: todo-backend
  config:
    import: optional:aws-secretsmanager:${AWS_SECRET_NAME}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/todo}
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${APP_REDIS_HOST:redis}
      port: ${APP_REDIS_PORT:6379}
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  jackson:
    visibility:
      getter: none
      is-getter: none
      field: any
    deserialization:
      fail-on-unknown-properties: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:}

app:
  public-url: ${APP_PUBLIC_URL:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
