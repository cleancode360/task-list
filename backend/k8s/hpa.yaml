apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: #{PROJECT_NAME}#-backend
  namespace: #{K8S_NAMESPACE}#
  labels:
    app: #{PROJECT_NAME}#-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: #{PROJECT_NAME}#-backend
  minReplicas: 2
  maxReplicas: 6
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
