apiVersion: v1
kind: Service
metadata:
  name: #{PROJECT_NAME}#-service
  namespace: #{K8S_NAMESPACE}#
  labels:
    app: #{PROJECT_NAME}#-service
spec:
  selector:
    app: #{PROJECT_NAME}#-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
