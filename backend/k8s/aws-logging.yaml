apiVersion: v1
kind: Namespace
metadata:
  name: aws-observability
  labels:
    aws-observability: enabled
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-logging
  namespace: aws-observability
data:
  parsers.conf: |
    [PARSER]
        Name cri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

  filters.conf: |
    [FILTER]
        Name parser
        Match *
        Key_Name log
        Parser cri
        Reserve_Data On

  output.conf: |
    [OUTPUT]
        Name cloudwatch_logs
        Match *
        region #{AWS_REGION}#
        log_group_name /eks/#{PROJECT_NAME}#-app
        log_stream_prefix backend-
        auto_create_group true
        log_key log
