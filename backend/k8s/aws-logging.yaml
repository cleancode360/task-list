apiVersion: v1
kind: Namespace
metadata:
  name: aws-observability
  labels:
    aws-observability: enabled
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-logging
  namespace: aws-observability
data:
  output.conf: |
    [OUTPUT]
        Name cloudwatch_logs
        Match *
        region #{AWS_REGION}#
        log_group_name /eks/#{PROJECT_NAME}#-app
        log_stream_prefix backend-
        auto_create_group true
        log_key log
