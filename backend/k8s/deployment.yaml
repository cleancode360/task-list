apiVersion: apps/v1
kind: Deployment
metadata:
  name: #{PROJECT_NAME}#-backend
  namespace: #{K8S_NAMESPACE}#
  labels:
    app: #{PROJECT_NAME}#-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: #{PROJECT_NAME}#-backend
  template:
    metadata:
      labels:
        app: #{PROJECT_NAME}#-backend
    spec:
      serviceAccountName: backend-secrets-sa
      containers:
        - name: backend
          image: #{IMAGE_URI}#
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "512m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
