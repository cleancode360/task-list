services:
  aws-kubectl:
    build:
      context: .
      dockerfile: Dockerfile.aws-kubectl
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
    ports:
      - "5005:5005"
    volumes:
      - ..:/workspace
      - kube-config:/root/.kube

  terraform:
    build:
      context: .
      dockerfile: Dockerfile.terraform
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
    volumes:
      - ../infra:/infra

  maven:
    image: maven:3.9.8-eclipse-temurin-17
    working_dir: /workspace/backend
    volumes:
      - ..:/workspace
      - maven-repo:/root/.m2

volumes:
  kube-config:
  maven-repo:
