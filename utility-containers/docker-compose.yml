services:
  aws:
    build:
      context: .
      dockerfile: Dockerfile.aws-kubectl
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
    volumes:
      - kube-config:/root/.kube

  kubectl:
    build:
      context: .
      dockerfile: Dockerfile.aws-kubectl
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_DEFAULT_REGION
    volumes:
      - kube-config:/root/.kube

volumes:
  kube-config:
