name: Deploy Frontend to Amplify

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SSM_PARAM_PREFIX: ${{ vars.SSM_PARAM_PREFIX }}
  AMPLIFY_BRANCH_NAME: ${{ vars.AMPLIFY_BRANCH_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve values from SSM
        run: |
          AMPLIFY_APP_ID=$(aws ssm get-parameter \
            --name "/$SSM_PARAM_PREFIX/amplify-app-id" \
            --query "Parameter.Value" --output text)
          BACKEND_PUBLIC_URL=$(aws ssm get-parameter \
            --name "/$SSM_PARAM_PREFIX/backend-public-url" \
            --query "Parameter.Value" --output text)
          echo "AMPLIFY_APP_ID=$AMPLIFY_APP_ID" >> "$GITHUB_ENV"
          echo "BACKEND_PUBLIC_URL=$BACKEND_PUBLIC_URL" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npx expo export --platform web
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ env.BACKEND_PUBLIC_URL }}

      - name: Deploy to Amplify
        run: |
          cd frontend/dist
          zip -r ../../deployment.zip .
          cd ../..
          RESULT=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH_NAME")
          UPLOAD_URL=$(echo "$RESULT" | jq -r '.zipUploadUrl')
          JOB_ID=$(echo "$RESULT" | jq -r '.jobId')
          curl --fail -T deployment.zip "$UPLOAD_URL"
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH_NAME" \
            --job-id "$JOB_ID"
