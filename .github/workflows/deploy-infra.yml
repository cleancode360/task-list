name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy all infrastructure (cannot be undone)"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_environment: ${{ vars.ENVIRONMENT }}
      TF_VAR_ssm_param_prefix: ${{ vars.SSM_PARAM_PREFIX }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_cognito_domain_prefix: ${{ vars.COGNITO_DOMAIN_PREFIX }}
      TF_VAR_frontend_branch: ${{ vars.AMPLIFY_BRANCH_NAME }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_k8s_namespace: ${{ vars.K8S_NAMESPACE }}
      TF_VAR_eks_enable_cluster_creator_admin_permissions: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Resolve backend config from SSM
        run: |
          PARAMETERS_JSON=$(aws ssm get-parameters-by-path \
            --path "/${{ vars.SSM_PARAM_PREFIX }}" \
            --recursive \
            --output json)

          TF_STATE_BUCKET=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/terraform-state-bucket")) | .Value')
          TF_LOCK_TABLE=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/terraform-lock-table")) | .Value')
          TF_STATE_KEY=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/terraform-state-key")) | .Value')
          TF_STATE_REGION=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/terraform-state-region")) | .Value')

          sed -i "s|#{TF_STATE_BUCKET}#|$TF_STATE_BUCKET|g" backend.tfbackend
          sed -i "s|#{TF_STATE_KEY}#|$TF_STATE_KEY|g" backend.tfbackend
          sed -i "s|#{TF_STATE_REGION}#|$TF_STATE_REGION|g" backend.tfbackend
          sed -i "s|#{TF_LOCK_TABLE}#|$TF_LOCK_TABLE|g" backend.tfbackend

          ALB_HOSTNAME=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/alb-hostname")) | .Value // empty')
          echo "TF_VAR_alb_hostname=$ALB_HOSTNAME" >> "$GITHUB_ENV"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: infra/.terraform/providers
          key: terraform-providers-${{ hashFiles('infra/.terraform.lock.hcl') }}

      - name: Terraform Init
        run: terraform init -backend-config=backend.tfbackend

      - name: Terraform Validate
        if: ${{ !inputs.destroy }}
        run: terraform validate

      - name: Terraform Plan
        if: ${{ !inputs.destroy }}
        id: plan
        run: |
          terraform plan -out=tfplan -detailed-exitcode || exit_code=$?
          if [ "${exit_code:-0}" -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          elif [ "$exit_code" -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            exit $exit_code
          fi

      - name: Terraform Apply
        if: ${{ !inputs.destroy && steps.plan.outputs.changes == 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: ${{ inputs.destroy }}
        run: terraform destroy -auto-approve
