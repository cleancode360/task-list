name: Deploy Infrastructure

on:
  push:
    branches:
      - master
    paths:
      - "infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_github_repository: ${{ vars.TF_VAR_GITHUB_REPOSITORY }}
      TF_VAR_github_oauth_token: ${{ secrets.TF_VAR_GITHUB_OAUTH_TOKEN }}
      TF_VAR_db_username: ${{ vars.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_app_username: ${{ vars.TF_VAR_APP_USERNAME }}
      TF_VAR_app_password: ${{ secrets.TF_VAR_APP_PASSWORD }}
      TF_VAR_frontend_branch: ${{ vars.TF_VAR_FRONTEND_BRANCH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
