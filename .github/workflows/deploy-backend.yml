name: Deploy Backend to EKS

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SSM_PARAM_PREFIX: ${{ vars.SSM_PARAM_PREFIX }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  DEPLOYMENT_NAME: ${{ env.PROJECT_NAME }}-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image, resolve infrastructure values
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          PARAMETERS_JSON=$(aws ssm get-parameters-by-path \
            --path "/$SSM_PARAM_PREFIX" \
            --recursive \
            --output json)

          EKS_CLUSTER_NAME=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/eks-cluster-name")) | .Value')
          ECR_REPOSITORY=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/ecr-repository-name")) | .Value')
          RDS_ENDPOINT=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/rds-endpoint")) | .Value')
          DB_NAME=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/rds-db-name")) | .Value')
          AMPLIFY_DOMAIN=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/amplify-default-domain")) | .Value')
          BACKEND_SECRETS_KEY=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/backend-secrets-key")) | .Value')
          ACM_CERTIFICATE_ARN=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/acm-certificate-arn")) | .Value')
          WAF_ACL_ARN=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/waf-acl-arn")) | .Value')

          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "EKS_CLUSTER_NAME=$EKS_CLUSTER_NAME" >> "$GITHUB_ENV"

          sed -i "s|#{IMAGE_URI}#|$IMAGE_URI|g" backend/k8s/deployment.yaml
          sed -i "s|#{RDS_ENDPOINT}#|$RDS_ENDPOINT|g" backend/k8s/configmap.yaml
          sed -i "s|#{DB_NAME}#|$DB_NAME|g" backend/k8s/configmap.yaml
          sed -i "s|#{AMPLIFY_DOMAIN}#|$AMPLIFY_DOMAIN|g" backend/k8s/configmap.yaml
          sed -i "s|#{SECRETS_MANAGER_KEY}#|$BACKEND_SECRETS_KEY|g" backend/k8s/configmap.yaml
          sed -i "s|#{ACM_CERTIFICATE_ARN}#|$ACM_CERTIFICATE_ARN|g" backend/k8s/ingress.yaml
          sed -i "s|#{WAF_ACL_ARN}#|$WAF_ACL_ARN|g" backend/k8s/ingress.yaml
          sed -i "s|#{AWS_REGION}#|$AWS_REGION|g" backend/k8s/*.yaml
          sed -i "s|#{PROJECT_NAME}#|$PROJECT_NAME|g" backend/k8s/*.yaml
      - name: Apply K8s manifests
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl apply -f backend/k8s/ -n "$K8S_NAMESPACE"
          kubectl rollout status deployment/"$DEPLOYMENT_NAME" -n "$K8S_NAMESPACE" --timeout=180s

      - name: Publish backend URL to SSM
        run: |
          ALB_HOSTNAME=$(kubectl get ingress "$DEPLOYMENT_NAME" -n "$K8S_NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          aws ssm put-parameter \
            --name "/$SSM_PARAM_PREFIX/backend-public-url" \
            --value "https://$ALB_HOSTNAME" \
            --type String --overwrite
