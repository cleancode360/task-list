name: Deploy Backend to EKS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SSM_PARAM_PREFIX: ${{ vars.SSM_PARAM_PREFIX }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  DEPLOYMENT_NAME: ${{ vars.PROJECT_NAME }}-backend
  INGRESS_NAME: ${{ vars.PROJECT_NAME }}-ingress

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image, resolve infrastructure values
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          PARAMETERS_JSON=$(aws ssm get-parameters-by-path \
            --path "/$SSM_PARAM_PREFIX" \
            --recursive \
            --output json)

          EKS_CLUSTER_NAME=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/eks-cluster-name")) | .Value')
          ECR_REPOSITORY=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/ecr-repository-name")) | .Value')
          RDS_ENDPOINT=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/rds-endpoint")) | .Value')
          DB_NAME=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/rds-db-name")) | .Value')
          AMPLIFY_APP_ID=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/amplify-app-id")) | .Value')
          AMPLIFY_DOMAIN=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/amplify-default-domain")) | .Value')
          BACKEND_SECRETS_KEY=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/backend-secrets-key")) | .Value')
          WAF_ACL_ARN=$(echo "$PARAMETERS_JSON" | jq -r '.Parameters[] | select(.Name | endswith("/waf-acl-arn")) | .Value')

          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          BACKEND_SECRETS_ROLE_ARN=$(aws iam get-role \
            --role-name "$PROJECT_NAME-$ENVIRONMENT-backend-secrets-reader" \
            --query 'Role.Arn' \
            --output text)
          echo "EKS_CLUSTER_NAME=$EKS_CLUSTER_NAME" >> "$GITHUB_ENV"

          sed -i "s|#{IMAGE_URI}#|$IMAGE_URI|g" backend/k8s/deployment.yaml
          sed -i "s|#{RDS_ENDPOINT}#|$RDS_ENDPOINT|g" backend/k8s/configmap.yaml
          sed -i "s|#{DB_NAME}#|$DB_NAME|g" backend/k8s/configmap.yaml
          sed -i "s|#{AMPLIFY_DOMAIN}#|$AMPLIFY_DOMAIN|g" backend/k8s/configmap.yaml
          sed -i "s|#{SECRETS_MANAGER_KEY}#|$BACKEND_SECRETS_KEY|g" backend/k8s/configmap.yaml
          sed -i "s|#{BACKEND_SECRETS_ROLE_ARN}#|$BACKEND_SECRETS_ROLE_ARN|g" backend/k8s/service-account.yaml
          sed -i "s|#{WAF_ACL_ARN}#|$WAF_ACL_ARN|g" backend/k8s/ingress.yaml
          sed -i "s|#{AWS_REGION}#|$AWS_REGION|g" backend/k8s/*.yaml
          sed -i "s|#{K8S_NAMESPACE}#|$K8S_NAMESPACE|g" backend/k8s/*.yaml
          sed -i "s|#{PROJECT_NAME}#|$PROJECT_NAME|g" backend/k8s/*.yaml
      - name: Apply K8s manifests
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl apply -f backend/k8s/namespace.yaml
          kubectl apply -f backend/k8s/aws-logging.yaml
          kubectl apply -f backend/k8s/configmap.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/service-account.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/deployment.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/service.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/redis-deployment.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/redis-service.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/hpa.yaml -n "$K8S_NAMESPACE"
          kubectl apply -f backend/k8s/ingress.yaml -n "$K8S_NAMESPACE"
          kubectl rollout status deployment/"$DEPLOYMENT_NAME" -n "$K8S_NAMESPACE" --timeout=900s

      - name: Dump rollout diagnostics on failure
        if: failure()
        run: |
          kubectl get sa backend-secrets-sa -n "$K8S_NAMESPACE" -o yaml
          kubectl get pods -n "$K8S_NAMESPACE" -o wide
          kubectl describe deployment "$DEPLOYMENT_NAME" -n "$K8S_NAMESPACE"
          kubectl describe pods -n "$K8S_NAMESPACE" -l app="$DEPLOYMENT_NAME"
          kubectl get pod -n "$K8S_NAMESPACE" -l app="$DEPLOYMENT_NAME" -o yaml | grep -E "serviceAccountName|AWS_ROLE_ARN|AWS_WEB_IDENTITY_TOKEN_FILE|eks.amazonaws.com/role-arn" || true
          echo "=== Logs from each backend pod ==="
          for pod in $(kubectl get pods -n "$K8S_NAMESPACE" -l app="$DEPLOYMENT_NAME" -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod ---"
            kubectl logs "$pod" -n "$K8S_NAMESPACE" --tail=200 || true
          done

      - name: Publish backend URL to SSM
        run: |
          ALB_HOSTNAME=""
          for attempt in $(seq 1 60); do
            ALB_HOSTNAME=$(kubectl get ingress "$INGRESS_NAME" -n "$K8S_NAMESPACE" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$ALB_HOSTNAME" ]; then
              break
            fi
            sleep 10
          done
          if [ -z "$ALB_HOSTNAME" ]; then
            echo "Timed out waiting for ingress hostname on $INGRESS_NAME" >&2
            exit 1
          fi
          cat > custom-rules.json <<EOF
          [
            {
              "source": "/api/<*>",
              "target": "http://$ALB_HOSTNAME/api/<*>",
              "status": "200"
            }
          ]
          EOF
          aws amplify update-app \
            --app-id "$AMPLIFY_APP_ID" \
            --custom-rules file://custom-rules.json
          aws ssm put-parameter \
            --name "/$SSM_PARAM_PREFIX/backend-public-url" \
            --value "/api" \
            --type String --overwrite
