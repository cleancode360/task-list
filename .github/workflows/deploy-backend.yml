name: Deploy Backend to EKS

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  K8S_NAMESPACE: todo-app
  DEPLOYMENT_NAME: todo-backend
  CONTAINER_NAME: backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image, resolve infrastructure values
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        RDS_DB_IDENTIFIER: ${{ vars.RDS_DB_IDENTIFIER }}
        AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
      run: |
        docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" backend
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

        IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        RDS_ENDPOINT=$(aws rds describe-db-instances \
          --db-instance-identifier "$RDS_DB_IDENTIFIER" \
          --query "DBInstances[0].Endpoint.Address" --output text)
        DB_NAME=$(aws rds describe-db-instances \
          --db-instance-identifier "$RDS_DB_IDENTIFIER" \
          --query "DBInstances[0].DBName" --output text)
        AMPLIFY_DOMAIN=$(aws amplify get-app \
          --app-id "$AMPLIFY_APP_ID" \
          --query "app.defaultDomain" --output text)

        sed -i "s|#{IMAGE_URI}#|$IMAGE_URI|g" backend/k8s/deployment.yaml
        sed -i "s|#{RDS_ENDPOINT}#|$RDS_ENDPOINT|g" backend/k8s/configmap.yaml
        sed -i "s|#{DB_NAME}#|$DB_NAME|g" backend/k8s/configmap.yaml
        sed -i "s|#{AMPLIFY_DOMAIN}#|$AMPLIFY_DOMAIN|g" backend/k8s/configmap.yaml

      - name: Apply K8s manifests
      run: |
        aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
        kubectl apply -f backend/k8s/ -n "$K8S_NAMESPACE"
        kubectl rollout status deployment/"$DEPLOYMENT_NAME" -n "$K8S_NAMESPACE" --timeout=180s
